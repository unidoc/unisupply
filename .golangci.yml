run:
  timeout: 5m
  go: '1.25'

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gocritic
    - gosec

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/unidoc/unisupply
  revive:
    severity: error
    rules:
      - name: exported
      - name: package-comments
  gocritic:
    enabled-tags: [diagnostic, style, performance]
    settings:
      rangeValCopy:
        sizeThreshold: 192

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, gocritic, gosec]
  max-issues-per-linter: 0
  max-same-issues: 0
