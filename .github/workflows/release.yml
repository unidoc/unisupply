name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true

      # Workaround for actions/checkout#290: checkout re-fetches the tag using
      # the commit SHA as the source refspec, which clobbers the annotated tag
      # object with a lightweight tag. Re-fetch by tag name to restore it.
      - name: Restore annotated tag object
        run: git fetch --force origin "+refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify tag signature
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile "$GITHUB_WORKSPACE/.github/allowed_signers"

          if ! git cat-file -t "$TAG" | grep -qx 'tag'; then
            echo "::error::Tag '$TAG' is a lightweight tag. Only annotated, SSH-signed tags are accepted."
            exit 1
          fi

          git verify-tag "$TAG"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify tag is on master
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          TAG_COMMIT=$(git rev-parse "${TAG}^{commit}")
          MASTER_COMMIT=$(git rev-parse refs/remotes/origin/master)

          echo "tag_commit=$TAG_COMMIT  master_head=$MASTER_COMMIT"

          if ! git merge-base --is-ancestor "$TAG_COMMIT" refs/remotes/origin/master; then
            echo "::error::Tag '$TAG' (commit $TAG_COMMIT) is not an ancestor of master ($MASTER_COMMIT)."
            echo "::error::Ensure the release commit is merged to master before tagging."
            exit 1
          fi

      - name: Verify no duplicate release tag
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          TAG_COMMIT=$(git rev-parse "${TAG}^{commit}")
          OTHER=$(git tag --points-at "$TAG_COMMIT" --list 'v*.*.*' | grep -vx "$TAG" || true)

          if [ -n "$OTHER" ]; then
            echo "::error::Commit $TAG_COMMIT already has release tag(s): $OTHER"
            echo "::error::The master branch may be stale. Check that no previous release tag points at this commit."
            exit 1
          fi

      - name: Verify version parity
        id: ver
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if [[ ! "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::Tag '$TAG' does not match semver pattern vX.Y.Z."
            exit 1
          fi
          VERSION="${BASH_REMATCH[1]}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify source-code version constants match tag
        uses: ./.github/actions/verify-version-parity
        with:
          version: ${{ steps.ver.outputs.version }}

      - name: Cross-compile binaries
        run: |
          mkdir -p dist/bin

          targets=(
            "linux   amd64"
            "linux   arm64"
            "darwin  amd64"
            "darwin  arm64"
            "windows amd64"
          )

          for entry in "${targets[@]}"; do
            read -r GOOS GOARCH <<< "$entry"
            export GOOS GOARCH
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            echo "Building $GOOS/$GOARCH ..."
            CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' \
              -o "dist/bin/unisupply-${GOOS}-${GOARCH}${EXT}" \
              ./cmd/unisupply/
          done

      - name: Package archives
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist/archive dist/stage

          unix_targets=(
            "linux   amd64"
            "linux   arm64"
            "darwin  amd64"
            "darwin  arm64"
          )

          for entry in "${unix_targets[@]}"; do
            read -r GOOS GOARCH <<< "$entry"
            PLATFORM="${GOOS}-${GOARCH}"
            DIR="unisupply-${VERSION}-${PLATFORM}"
            STAGE="dist/stage/${DIR}"

            mkdir -p "$STAGE"
            cp "dist/bin/unisupply-${GOOS}-${GOARCH}" "$STAGE/unisupply"
            cp LICENSE "$STAGE/LICENSE"
            cp README.md "$STAGE/README.md"

            tar -czf "dist/archive/unisupply-${VERSION}-${PLATFORM}.tar.gz" \
              -C dist/stage "$DIR"
          done

          GOOS="windows"
          GOARCH="amd64"
          PLATFORM="${GOOS}-${GOARCH}"
          DIR="unisupply-${VERSION}-${PLATFORM}"
          STAGE="dist/stage/${DIR}"

          mkdir -p "$STAGE"
          cp "dist/bin/unisupply-${GOOS}-${GOARCH}.exe" "$STAGE/unisupply.exe"
          cp LICENSE "$STAGE/LICENSE"
          cp README.md "$STAGE/README.md"

          (cd dist/stage && zip -r "../archive/unisupply-${VERSION}-${PLATFORM}.zip" "$DIR")

      - name: Generate SBOMs
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          cp dist/bin/unisupply-linux-amd64 /tmp/unisupply
          chmod +x /tmp/unisupply

          /tmp/unisupply -f sbom-cyclonedx -o "dist/archive/unisupply-${VERSION}-sbom.cdx.json" ./
          /tmp/unisupply -f sbom-spdx      -o "dist/archive/unisupply-${VERSION}-sbom.spdx.json" ./

      - name: Generate SHA256SUMS
        run: |
          cd dist/archive && sha256sum -- *.tar.gz *.zip *-sbom.cdx.json *-sbom.spdx.json > SHA256SUMS
          cat SHA256SUMS

      # --generate-notes walks back to the previous tag; on the first tag it walks to repo init.
      # The release is created as a draft — edit the auto-generated notes before publishing.
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/archive/* --clobber
          else
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --generate-notes \
              --notes "Draft release built from signed tag \`$TAG\`. Review the assets and auto-generated notes, edit as needed, then click **Publish release**." \
              dist/archive/*
          fi
