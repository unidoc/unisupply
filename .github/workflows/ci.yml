name: CI

on:
  pull_request:
    branches: [development, master]
    types: [opened, synchronize, reopened]
  push:
    branches: [development, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOLANGCI_LINT_VERSION: 'v1.64.8'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          diff=$(gofmt -l -s .)
          if [ -n "$diff" ]; then
            echo "The following files are not gofmt'd:"
            echo "$diff"
            exit 1
          fi

      - name: goimports
        run: |
          go install golang.org/x/tools/cmd/goimports@v0.44.0  # pin: update when bumping golang.org/x/tools in go.mod
          diff=$(goimports -l .)
          if [ -n "$diff" ]; then
            echo "The following files have import ordering issues:"
            echo "$diff"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}
          golangci-lint run ./...

  license-check:
    name: License Inventory
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install go-licenses
        run: go install github.com/google/go-licenses/v2@3e084b0caf710f7bfead967567539214f598c0a2  # v2.0.1
      - name: Check license inventory
        run: bash .github/scripts/check-licenses.sh

  test-license-scripts:
    name: License Script Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install bats-core
        run: |
          npm install -g bats
          bats --version
      - name: Run check-licenses.sh bats tests
        run: bats .github/scripts/tests/check-licenses.bats

  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25.10', '1.26.0']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Run tests
        run: go test -race -v ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags='-s -w' \
            -o "bin/unisupply-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./cmd/unisupply/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: unisupply-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/unisupply-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 7

  version-check:
    name: Version Parity
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.base_ref == 'master' &&
      startsWith(github.head_ref, 'rc-v')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Derive version from branch name
        id: parse
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          BRANCH="$HEAD_REF"
          if [[ ! "$BRANCH" =~ ^rc-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::Branch '$BRANCH' must match rc-vX.Y.Z (semver)."
            exit 1
          fi
          VERSION="${BASH_REMATCH[1]}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"     >> "$GITHUB_OUTPUT"

      - name: Verify source-code version constants match branch
        uses: ./.github/actions/verify-version-parity
        with:
          version: ${{ steps.parse.outputs.version }}

      - name: Verify tag does not already exist
        env:
          TAG: ${{ steps.parse.outputs.tag }}
        run: |
          if git ls-remote --tags --exit-code origin "refs/tags/$TAG" > /dev/null 2>&1; then
            echo "::error::Tag $TAG already exists on origin. Bump rc branch version."
            exit 1
          fi

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: |
          go test -covermode=atomic -coverprofile=coverage.out ./pkg/... > /tmp/go-test-out.txt 2>&1
          cat /tmp/go-test-out.txt

      - name: Compute coverage summary
        id: cov
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          echo "total=${total}" >> "$GITHUB_OUTPUT"
          {
            echo 'per_package<<EOF'
            grep -E '^ok\s' /tmp/go-test-out.txt | \
              awk '{pkg=$2; for(i=1;i<=NF;i++) if($i=="coverage:"){printf "%s\t%s\n", $(i+1), pkg; break}}' | \
              sort -t'%' -k1 -n
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-profile
          path: coverage.out
          retention-days: 7

      - name: Enforce coverage floor (master PRs only)
        if: github.base_ref == 'master'
        env:
          FLOOR: '50'
          TOTAL: ${{ steps.cov.outputs.total }}
        run: |
          pct="${TOTAL%\%}"
          awk -v p="$pct" -v f="$FLOOR" 'BEGIN { exit !(p+0 >= f+0) }' || {
            echo "::error::Total coverage $TOTAL is below floor ${FLOOR}%."
            exit 1
          }
          echo "Coverage $TOTAL >= ${FLOOR}% floor — OK."

      - name: Upsert PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const marker = '<!-- code-coverage-report -->';
            const total = `${{ steps.cov.outputs.total }}`;
            const perPkg = `${{ steps.cov.outputs.per_package }}`;

            const rows = perPkg.trim().split('\n').filter(Boolean).map(line => {
              const [cov, pkg] = line.split('\t');
              return `| \`${pkg}\` | ${cov} |`;
            }).join('\n');

            const body = [
              marker,
              `## Code Coverage`,
              ``,
              `**Total: ${total}**`,
              ``,
              `<details><summary>Per-package breakdown (low → high)</summary>`,
              ``,
              `| Package | Coverage |`,
              `|---|---|`,
              rows || '| _(no packages)_ | — |',
              ``,
              `</details>`,
              ``,
              `_Generated for commit \`${context.payload.pull_request.head.sha.substring(0, 7)}\`._`
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
